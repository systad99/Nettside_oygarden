<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Grøftesnitt PRO</title>
<style>
body { font-family: Arial, sans-serif; display: flex; margin: 0; }
.panel {
    width: 280px;
    padding: 20px;
    border-right: 1px solid #ccc;
    overflow-y: auto;
    max-height: 100vh;
}
.panel h3 { margin-top: 0; }
canvas { flex: 1; border: 1px solid #222; margin: 10px; }
input { width: 100%; margin-bottom: 8px; padding: 4px; box-sizing: border-box; }
label { display: block; font-size: 12px; margin-top: 10px; font-weight: bold; }
button { width: 100%; padding: 10px; margin-top: 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
button:hover { background: #45a049; }
</style>
</head>
<body>

<div class="panel">
<h3>Parametere</h3>

<label>Overdekning (mm)</label>
<input id="overdekning" value="400" type="number">

<label>Ledningssone dybde (mm)</label>
<input id="ledning" value="150" type="number">

<label>Fundament dybde (mm)</label>
<input id="fundament" value="100" type="number">

<label>Rørdiameter (mm)</label>
<input id="ror" value="110" type="number">

<label>Bunn bredde (mm)</label>
<input id="bunn" value="310" type="number">

<label>Skråningsvinkel (grader)</label>
<input id="vinkel" value="45" type="number">

<button onclick="tegn()">Tegn grøft</button>
</div>

<canvas id="c" width="900" height="550"></canvas>

<script>

// Hjelpefunksjon for skravur
function hatchPattern(ctx, pathFn, type) {
    ctx.save();
    ctx.beginPath();
    pathFn();
    ctx.clip();
    ctx.strokeStyle = "#999";
    ctx.lineWidth = 1;

    if(type === "diagonal") {
        for(let i=-500; i<1000; i+=12){
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i+800, 800);
            ctx.stroke();
        }
    }

    if(type === "cross") {
        for(let i=-500; i<1000; i+=12){
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i+800, 800);
            ctx.stroke();
        }
        for(let i=-500; i<1000; i+=12){
            ctx.beginPath();
            ctx.moveTo(i, 800);
            ctx.lineTo(i+800, 0);
            ctx.stroke();
        }
    }

    if(type === "horizontal") {
        for(let y=0; y<800; y+=8){
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(800, y);
            ctx.stroke();
        }
    }

    ctx.restore();
}

// Konverteringsfunksjoner fra mm til canvas
function X(mm) {
    const centerX = 350;
    const scale = 0.6; // mm til pixels
    return centerX + mm * scale;
}

function Y(mm) {
    const startY = 40;
    const scale = 0.6;
    return startY + mm * scale;
}

function tegn(){
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Hent input-verdier
    const overdekning = parseFloat(document.getElementById("overdekning").value);
    const ledning = parseFloat(document.getElementById("ledning").value);
    const fundament = parseFloat(document.getElementById("fundament").value);
    const ror = parseFloat(document.getElementById("ror").value);
    const bunn = parseFloat(document.getElementById("bunn").value);
    const vinkel = parseFloat(document.getElementById("vinkel").value);
    
    // Beregner dimensjoner
    const totalDybde = overdekning + ledning + fundament;
    const radius = ror / 2;
    const vinkelRad = (vinkel * Math.PI) / 180;
    const topBredde = bunn + 2 * totalDybde * Math.tan(vinkelRad);
    
    // Overkant
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(X(-topBredde/2), Y(0));
    ctx.lineTo(X(topBredde/2), Y(0));
    ctx.stroke();
    
    // Skråninger og bunn
    ctx.beginPath();
    ctx.moveTo(X(-topBredde/2), Y(0));
    ctx.lineTo(X(-bunn/2), Y(totalDybde));
    ctx.lineTo(X(bunn/2), Y(totalDybde));
    ctx.lineTo(X(topBredde/2), Y(0));
    ctx.stroke();
    
    // SKRAVUR - Gjenfyllingssone
    hatchPattern(ctx, () => {
        ctx.moveTo(X(-topBredde/2), Y(0));
        ctx.lineTo(X(topBredde/2), Y(0));
        ctx.lineTo(X(topBredde/2 - overdekning * Math.tan(vinkelRad)), Y(overdekning));
        ctx.lineTo(X(-topBredde/2 + overdekning * Math.tan(vinkelRad)), Y(overdekning));
        ctx.closePath();
    }, "diagonal");
    
    // SKRAVUR - Ledningssone
    hatchPattern(ctx, () => {
        ctx.moveTo(X(topBredde/2 - overdekning * Math.tan(vinkelRad)), Y(overdekning));
        ctx.lineTo(X(-topBredde/2 + overdekning * Math.tan(vinkelRad)), Y(overdekning));
        ctx.lineTo(X(-bunn/2), Y(overdekning + ledning));
        ctx.lineTo(X(bunn/2), Y(overdekning + ledning));
        ctx.closePath();
    }, "cross");
    
    // SKRAVUR - Fundament
    hatchPattern(ctx, () => {
        ctx.moveTo(X(-bunn/2), Y(totalDybde - fundament));
        ctx.lineTo(X(bunn/2), Y(totalDybde - fundament));
        ctx.lineTo(X(bunn/2), Y(totalDybde));
        ctx.lineTo(X(-bunn/2), Y(totalDybde));
        ctx.closePath();
    }, "horizontal");
    
    // RØR
    ctx.beginPath();
    ctx.arc(X(0), Y(overdekning + ledning + fundament/2), radius * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = "orange";
    ctx.fill();
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // Dimensjonslinjer
    ctx.strokeStyle = "#000";
    ctx.fillStyle = "#000";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";
    
    // Bunn-bredde
    ctx.beginPath();
    ctx.moveTo(X(-bunn/2), Y(totalDybde + 30));
    ctx.lineTo(X(bunn/2), Y(totalDybde + 30));
    ctx.stroke();
    ctx.fillText(Math.round(bunn) + " mm", X(0), Y(totalDybde + 50));
    
    // Dybdemål
    ctx.strokeStyle = "#000";
    ctx.textAlign = "right";
    ctx.font = "11px Arial";
    
    // Overdekning
    ctx.beginPath();
    ctx.moveTo(X(-topBredde/2 - 40), Y(0));
    ctx.lineTo(X(-topBredde/2 - 40), Y(overdekning));
    ctx.stroke();
    ctx.fillText(Math.round(overdekning), X(-topBredde/2 - 50), Y(overdekning/2));
    
    // Ledningssone
    ctx.beginPath();
    ctx.moveTo(X(-topBredde/2 - 40), Y(overdekning));
    ctx.lineTo(X(-topBredde/2 - 40), Y(overdekning + ledning));
    ctx.stroke();
    ctx.fillText(Math.round(ledning), X(-topBredde/2 - 50), Y(overdekning + ledning/2));
    
    // Fundament
    ctx.beginPath();
    ctx.moveTo(X(-topBredde/2 - 40), Y(overdekning + ledning));
    ctx.lineTo(X(-topBredde/2 - 40), Y(totalDybde));
    ctx.stroke();
    ctx.fillText(Math.round(fundament), X(-topBredde/2 - 50), Y(overdekning + ledning + fundament/2));
    
    // TEKST
    ctx.fillStyle = "#333";
    ctx.textAlign = "center";
    ctx.font = "bold 12px Arial";
    
    // Tekstlabels på siden
    ctx.save();
    ctx.translate(X(-topBredde/2 - 100), Y(overdekning/2));
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = "center";
    ctx.fillText("GJENFYLLINGSSONE", 0, 0);
    ctx.restore();
    
    ctx.save();
    ctx.translate(X(-topBredde/2 - 100), Y(overdekning + ledning/2));
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = "center";
    ctx.fillText("LEDNINGSSONE", 0, 0);
    ctx.restore();
    
    ctx.save();
    ctx.translate(X(-topBredde/2 - 100), Y(overdekning + ledning + fundament/2));
    ctx.rotate(-Math.PI/2);
    ctx.textAlign = "center";
    ctx.fillText("NEDRE FUNDAMENT", 0, 0);
    ctx.restore();
    
    ctx.textAlign = "center";
    ctx.font = "11px Arial";
    ctx.fillText("Strøm Styreskap", X(0), Y(overdekning + ledning + fundament/2) + 30);
}

// Tegn ved start
tegn();
</script>



</body>
</html>
