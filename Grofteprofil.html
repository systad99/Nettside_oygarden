<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Grøftesnitt PRO v2</title>
<style>
body { font-family: Arial; margin: 20px; }
canvas { border: 1px solid #222; }
</style>
</head>
<body>

<h2>Grøftesnitt – versjon 2</h2>
<button onclick="tegn()">Tegn</button>

<canvas id="c" width="1000" height="650"></canvas>

<script>
function tegn(){

const ctx = document.getElementById("c").getContext("2d");
ctx.clearRect(0,0,1000,650);

// ---------------- PARAMETERE (mm)
const overdekning = 400;
const ledning = 150;
const fundament = 100;
const ror = 110;
const side = 100;
const vinkel = 45;

// ---------------- BEREGNING
const dybde = overdekning + ledning + fundament;
const bunn = ror + side*2;
const topp = bunn + 2 * dybde * Math.tan(vinkel*Math.PI/180);

// ---------------- SKALA
const s = 0.5;
const cx = 500;
const topY = 60;

const X = x => cx + x*s;
const Y = y => topY + y*s;

// ---------------- SKRAVUR
function hatch(areaFn){
    ctx.save();
    ctx.clip(areaFn);
    for(let i=-1000;i<1000;i+=10){
        ctx.beginPath();
        ctx.moveTo(i,0);
        ctx.lineTo(i+1000,1000);
        ctx.strokeStyle="#aaa";
        ctx.stroke();
    }
    ctx.restore();
}

// ---------------- GRØFT FORM
ctx.beginPath();
ctx.moveTo(X(-topp/2), Y(0));
ctx.lineTo(X(topp/2), Y(0));
ctx.lineTo(X(bunn/2), Y(dybde-50));

// avrundet bunn
ctx.quadraticCurveTo(X(0), Y(dybde+30), X(-bunn/2), Y(dybde-50));

ctx.closePath();
ctx.stroke();

// ---------------- SKRAVUR MASSER
ctx.save();
ctx.beginPath();
ctx.moveTo(X(-topp/2), Y(0));
ctx.lineTo(X(topp/2), Y(0));
ctx.lineTo(X(bunn/2), Y(dybde));
ctx.lineTo(X(-bunn/2), Y(dybde));
ctx.closePath();
ctx.clip();

for(let i=-500;i<1500;i+=12){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i+1000,1000);
    ctx.strokeStyle="#ccc";
    ctx.stroke();
}
ctx.restore();

// ---------------- RØR
ctx.beginPath();
ctx.arc(X(0), Y(dybde - fundament - ror/2), ror/2*s, 0, Math.PI*2);
ctx.fillStyle="orange";
ctx.fill();
ctx.stroke();

// jordleder
ctx.beginPath();
ctx.arc(X(0), Y(dybde - fundament - ror/2 + 60), 5, 0, Math.PI*2);
ctx.fill();

// ---------------- MÅL FUNKSJON
function dim(x1,y1,x2,y2,text){
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    const ang = Math.atan2(y2-y1,x2-x1);

    function arrow(x,y,dir){
        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x - 8*Math.cos(ang-dir), y - 8*Math.sin(ang-dir));
        ctx.lineTo(x - 8*Math.cos(ang+dir), y - 8*Math.sin(ang+dir));
        ctx.fill();
    }

    arrow(x1,y1,0.3);
    arrow(x2,y2,-0.3);

    ctx.fillText(text,(x1+x2)/2,(y1+y2)/2-5);
}

// ---------------- MÅL
dim(X(-bunn/2), Y(dybde+60), X(bunn/2), Y(dybde+60), bunn+" mm");
dim(X(-topp/2), Y(-30), X(topp/2), Y(-30), Math.round(topp)+" mm");

dim(X(topp/2+60), Y(0), X(topp/2+60), Y(overdekning), "min "+overdekning);
dim(X(topp/2+60), Y(overdekning), X(topp/2+60), Y(overdekning+ledning), "min "+ledning);
dim(X(topp/2+60), Y(dybde-fundament), X(topp/2+60), Y(dybde), fundament);

// ---------------- SONER
ctx.save();
ctx.translate(X(-topp/2-100), Y(200));
ctx.rotate(-Math.PI/2);
ctx.fillText("GJENFYLLINGSSONE",0,0);
ctx.restore();

ctx.save();
ctx.translate(X(-topp/2-100), Y(overdekning+80));
ctx.rotate(-Math.PI/2);
ctx.fillText("LEDNINGSSONE",0,0);
ctx.restore();

ctx.save();
ctx.translate(X(-topp/2-100), Y(dybde-50));
ctx.rotate(-Math.PI/2);
ctx.fillText("NEDRE FUNDAMENT",0,0);
ctx.restore();

// ---------------- TEKST
ctx.fillText("Merkebånd, kabeldekkbord og", X(-120), Y(120));
ctx.fillText("skilleplate iht. gjeldende", X(-120), Y(150));
ctx.fillText("forskrifter og kabeleiers", X(-120), Y(180));
ctx.fillText("spesifikasjon.", X(-120), Y(210));

ctx.fillText("Strøm Styreskap", X(-60), Y(overdekning+20));
ctx.fillText("Jordavleder 25", X(-40), Y(dybde-20));

}

tegn();
</script>

</body>
</html>
